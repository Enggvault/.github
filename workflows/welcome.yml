name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to the EnggVault organization.
            
            Thank you for opening your first issue. We appreciate your effort in reporting this matter or suggesting an enhancement.
            
            A maintainer will review the submission shortly. Please ensure all necessary technical details have been provided per our issue templates.
          pr-message: |
            Welcome to the EnggVault organization.
            
            Thank you for submitting your first pull request. We appreciate your contribution to the project.
            
            Prior to review, please verify that:
            - You have adhered to our contributing guidelines.
            - All test suites execute successfully.
            - Relevant documentation has been updated.
            
            A maintainer will conduct a code review shortly. Thank you.
