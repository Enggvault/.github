name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to the EnggVault organization! 🎉
            
            Thank you for opening your first issue. We appreciate you taking the time to report this or suggest an idea.
            
            A maintainer will review this shortly. In the meantime, please ensure you've provided all necessary details according to our issue templates.
          pr-message: |
            Welcome to the EnggVault organization! 🎉
            
            Thank you for creating your first pull request! We're excited to have you contribute.
            
            Before we merge, please ensure that:
            - You have followed our contributing guidelines.
            - All tests pass (if applicable).
            - You have updated relevant documentation.
            
            A maintainer will review your code soon. Thanks again!
