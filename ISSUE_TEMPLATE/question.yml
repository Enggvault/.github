name: Question
description: Submit an inquiry regarding project implementation
title: "[Question]: "
labels: ["question"]
assignees:
  - ''
body:
  - type: markdown
    attributes:
      value: |
        Note: General inquiries are typically resolved faster within [GitHub Discussions](https://github.com/Enggvault/project-name/discussions) or on our [Discord Server](https://discord.gg/g467F3xBeQ). 
        If you require a formal issue, please proceed below.
  - type: textarea
    id: question
    attributes:
      label: Inquiry
      description: State your question clearly.
      placeholder: Detail the technical question or clarification needed...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and Implementation
      description: Detail your objective and provide relevant code snippets or configuration files to assist with troubleshooting.
    validations:
      required: true
