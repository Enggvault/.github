name: ❓ Question / Help
description: Ask a question about how to use this project
title: "[Question]: "
labels: ["question"]
assignees:
  - ''
body:
  - type: markdown
    attributes:
      value: |
        Please note: General questions are often better suited for our [GitHub Discussions](https://github.com/Enggvault/project-name/discussions) or our [Discord server](https://discord.gg/your-invite-code). 
        However, if you feel an issue is appropriate, please proceed!
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I configure X to work with Y?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? Provide relevant code snippets or configuration if helpful.
    validations:
      required: true
