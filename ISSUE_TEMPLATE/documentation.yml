name: 📖 Documentation Improvement
description: Suggest an improvement or report a typo in the documentation
title: "[Docs]: "
labels: ["documentation", "triage"]
assignees:
  - ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve our documentation!
  - type: input
    id: url
    attributes:
      label: URL of the documentation page
      description: Where is the issue located?
      placeholder: https://...
    validations:
      required: true
  - type: textarea
    id: issue-description
    attributes:
      label: Describe the issue
      description: What needs to be fixed or improved? (e.g., Typo, unclear instructions, missing information)
      placeholder: In the section about X, it says Y, but it should say Z.
    validations:
      required: true
  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed change (optional)
      description: If you know what the fix should be, please suggest it here.
      placeholder: Change "old text" to "new text".
    validations:
      required: false
