name: Documentation Improvement
description: Propose a correction or enhancement to the documentation
title: "[Docs]: "
labels: ["documentation", "triage"]
assignees:
  - ''
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping us maintain accurate documentation.
  - type: input
    id: url
    attributes:
      label: Documentation URL
      description: Provide the direct link to the page requiring modification.
      placeholder: https://...
    validations:
      required: true
  - type: textarea
    id: issue-description
    attributes:
      label: Issue Description
      description: Detail the inaccuracy, typo, or unclear section.
      placeholder: Describe the issue in the current text...
    validations:
      required: true
  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed Revision (Optional)
      description: Suggest the specific textual correction.
      placeholder: Provide the revised text...
    validations:
      required: false
