name: Feature Request
description: Propose an enhancement for this project
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - ''
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting a feature request. 
        Please provide detailed context to assist us in evaluating your proposal.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your request related to a specific problem? Provide a clear and concise description.
      placeholder: Describe the current limitation or problem...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Provide a clear description of your intended solution or functionality.
      placeholder: Describe the desired feature implementation...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Considerations
      description: Describe any alternative solutions or approaches you have evaluated.
      placeholder: Describe alternative methods...
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Include any other relevant information, mockups, or technical constraints.
      placeholder: Additional technical details...
    validations:
      required: false
