name: Bug Report
description: Submit a report to help us improve the software
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - ''
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to submit a bug report. 
        Before proceeding, please consult our [FAQ](https://enggvault.com/docs) or search the existing issue tracker to confirm it has not already been reported.
  - type: input
    id: version
    attributes:
      label: Project Version
      description: Indicate the version of the project you are running (e.g., v1.2.3, main branch).
      placeholder: e.g., v1.2.3
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Issue Description
      description: Describe the behavior you observed and the behavior you expected.
      placeholder: Provide a clear description of the issue.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide precise steps or a minimal code reproduction to isolate the issue.
      placeholder: |
        1. Navigate to '...'
        2. Execute '....'
        3. Observe the resulting error.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Detail your execution environment (Operating System, Browser, Node.js runtime, etc.).
      placeholder: |
        - OS: [e.g. macOS 14.2]
        - Node: [e.g. 20.10.0]
        - Browser: [e.g. Chrome 120]
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Include any supplementary information, logs, or screenshots.
      placeholder: Additional context regarding the problem...
    validations:
      required: false
