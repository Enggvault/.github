name: 🐛 Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Before you submit, please check our [FAQ](https://enggvault.com/docs) or search the existing issues to see if it's already been reported.
  - type: input
    id: version
    attributes:
      label: Project Version
      description: What version of the project are you using? (e.g., v1.2.3, main branch)
      placeholder: e.g., v1.2.3
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Please provide clear steps or a minimal code example to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Please provide relevant details about your environment (OS, Browser, Node.js version, etc.)
      placeholder: |
        - OS: [e.g. macOS 14.2]
        - Node: [e.g. 20.10.0]
        - Browser: [e.g. Chrome 120]
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information or screenshots that might be helpful.
      placeholder: Add any other context about the problem here.
    validations:
      required: false
